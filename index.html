<html>
  <head>
    <style>
      body {
        background-color: black;
        color: white;
        font-family: Barlow, sans-serif;
      }
      h2.subtitle {
        font-size: 72px;
        font-weight: 400;
        letter-spacing: 2px;
      }
      .center-headers {
        text-align: center;
        width: 100%;
      }
      .vertical-center {
        width: 100%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .hero-img {
        width: 600px;
      }

      .contact-container {
        position: absolute;
        top: 0;
        right: 0;
        padding: 36px;
      }
      a {
        font-size: 24px;
        color: white;
        text-decoration: none;
      }

      a:hover {
        color: rgb(242, 178, 62);
      }
    </style>
  </head>
  <body>
    <div class="contact-container">
      <a href="mailto: contact@ouros.energy" class="contact">Contact</a>
    </div>
    <div class="vertical-center">
      <div class="center-headers">
        <img
          alt="Ouros"
          class="hero-img"
          src="assets/img/Ouro-Yellow-White-Wordmark.png"
        />
        <h2 class="subtitle">10x Batteries</h2>
      </div>
    </div>
  </body>
</html>
